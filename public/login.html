<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitaSafe — Login</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main class="login-container">

        <h2>Login OrbitaSafe</h2>

        <form onsubmit="login(); return false;">

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
            </div>

            <button type="submit">Entrar</button>

        </form>

        <p class="login-cadastro">Ainda não tem conta? Informe seu nome e cadastre-se:</p>

        <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Seu nome">
        </div>

        <button type="button" class="btn-secundario" onclick="cadastrar()">Cadastrar</button>

    </main>
    <footer>© 2026 - OrbitaSafe FIAP</footer>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    <script src="js/logout.js"></script>

</body>

</html>
